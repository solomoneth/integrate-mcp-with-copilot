<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>


    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="project-ideas-container">
        <h3>Student Project Ideas</h3>
        <div id="project-ideas-list">
          <p>Loading project ideas...</p>
        </div>
        <h4>Submit a New Project Idea</h4>
        <form id="project-idea-form">
          <div class="form-group">
            <label for="project-title">Project Title:</label>
            <input type="text" id="project-title" required placeholder="e.g. Robotics Club" />
          </div>
          <div class="form-group">
            <label for="project-description">Description:</label>
            <input type="text" id="project-description" required placeholder="Describe your idea..." />
          </div>
          <div class="form-group">
            <label for="project-owner-email">Your Email:</label>
            <input type="email" id="project-owner-email" required placeholder="your-email@mergington.edu" />
          </div>
          <button type="submit">Submit Project Idea</button>
        </form>
        <div id="project-message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
